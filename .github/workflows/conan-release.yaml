#  ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
#  ┃ Conan build + release for the `rust-axum` example.                         ┃
#  ┃                                                                           ┃
#  ┃ This is NOT the upstream Perspective monorepo CI (see build.yaml). It      ┃
#  ┃ exercises *this* fork's contribution: building the C++ engine with its     ┃
#  ┃ Conan-resolved dependencies and producing a runnable `rust-axum` server.   ┃
#  ┃                                                                           ┃
#  ┃   * push to main / PR / manual  -> build on Linux + Windows, upload the    ┃
#  ┃     packaged server as a workflow artifact.                                ┃
#  ┃   * push a `v*` tag             -> additionally publish a GitHub Release    ┃
#  ┃     with the per-OS archives attached.                                     ┃
#  ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

name: Conan Build & Release

on:
    push:
        branches:
            - main
        tags:
            - "v*"
    pull_request:
        branches:
            - main
    workflow_dispatch:

# Allow only one build per ref; cancel superseded in-progress runs.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write # needed by the release job to create/upload the GitHub Release

jobs:
    # ── Build the engine (Conan deps) + rust-axum example, package per OS ──────
    build:
        name: Build (${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: linux-x64
                      bin: rust-axum
                      archive: rust-axum-linux-x64.tar.gz
                    - os: windows-2022
                      target: windows-x64
                      bin: rust-axum.exe
                      archive: rust-axum-windows-x64.zip

        env:
            # The first build compiles Arrow/protobuf/Boost from source via Conan
            # (the csv-on/thrift-off Arrow option set has no prebuilt binary).
            # Those land in the Conan home cache below, so re-runs are fast.
            CARGO_TERM_COLOR: always

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            # rust-toolchain.toml pins nightly-2026-01-01 (+ rust-src, bindeps).
            # `rustup show` triggers the auto-install of that exact toolchain.
            - name: Install pinned Rust toolchain
              shell: bash
              run: rustup show

            - name: Set up Python (for Conan)
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Conan
              shell: bash
              run: pip install "conan>=2.0"

            - name: Set up Node (to vendor the viewer assets)
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install CMake + Ninja
              uses: lukka/get-cmake@latest

            # Cache the Conan home: this holds the from-source Arrow/protobuf/etc.
            # builds, which are the slow part. conanfile.py is the cache key.
            - name: Cache Conan packages
              uses: actions/cache@v4
              with:
                  path: ~/.conan2
                  key: conan-${{ matrix.target }}-${{ hashFiles('rust/perspective-server/conanfile.py', 'rust/perspective-server/conan/profiles/*') }}
                  restore-keys: |
                      conan-${{ matrix.target }}-

            # Cache cargo registry + git deps (and the rust dep build artifacts).
            - name: Cache Cargo
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: conan-${{ matrix.target }}

            # Windows: long C++/Arrow build paths blow past the 260-char MAX_PATH
            # limit. Enable long paths and build under a short root (C:\t, C:\b).
            - name: Enable Windows long paths
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
                      -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
                  git config --system core.longpaths true

            - name: Build rust-axum (Linux)
              if: runner.os == 'Linux'
              shell: bash
              run: cargo build -p rust-axum --features _hack --release

            - name: Build rust-axum (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              env:
                  # Short build roots to dodge MAX_PATH; force the generator CMake
                  # ships (Conan would otherwise pick whatever newest VS is found).
                  CARGO_TARGET_DIR: C:\t
                  PSP_CPP_BUILD_DIR: C:\b
                  CMAKE_GENERATOR: Visual Studio 17 2022
              run: cargo build -p rust-axum --features _hack --release

            # Export the prebuilt Arrow binary from the Conan cache. Arrow's
            # non-default options (with_csv / with_lz4, required by the engine)
            # mean Conan Center has no matching prebuilt, so it builds from
            # source — and that source download is often firewalled in corporate
            # nets. Ship the built binary so users can skip both: either
            #   conan cache restore arrow-conan-<target>.tgz      (per machine), or
            #   conan upload "arrow/*:*" -r <internal-remote> --confirm  (org-wide).
            # The package_id matches any host using the committed conan profile.
            - name: Export Arrow Conan binary
              shell: bash
              run: conan cache save "arrow/*:*" --file "arrow-conan-${{ matrix.target }}.tgz"

            - name: Upload Arrow Conan binary
              uses: actions/upload-artifact@v4
              with:
                  name: arrow-conan-${{ matrix.target }}.tgz
                  path: arrow-conan-${{ matrix.target }}.tgz
                  if-no-files-found: error

            # The example serves src/index.html + the viewer bundles and dataset
            # from node_modules/ relative to its working dir. Vendor them so the
            # released archive is self-contained and runnable. Install into a
            # clean throwaway dir: the example's own package.json uses a pnpm
            # `catalog:` ref that plain npm can't resolve.
            - name: Vendor frontend assets
              shell: bash
              run: |
                  mkdir -p _vendor && cd _vendor
                  npm init -y >/dev/null
                  npm install --no-audit --no-fund \
                      @perspective-dev/client@4.5.0 \
                      @perspective-dev/viewer@4.5.0 \
                      @perspective-dev/viewer-datagrid@4.5.0 \
                      @perspective-dev/viewer-charts@4.5.0 \
                      superstore-arrow@1.0.0

            - name: Stage package (Linux)
              if: runner.os == 'Linux'
              shell: bash
              run: |
                  mkdir -p stage/src
                  cp "rust/target/release/${{ matrix.bin }}" stage/
                  cp examples/rust-axum/src/index.html stage/src/
                  cp -r _vendor/node_modules stage/node_modules
                  cat > stage/RUN.txt <<'EOF'
                  Perspective rust-axum example (Conan build)

                  Run from this directory so ./src/index.html and ./node_modules resolve:

                      ./rust-axum

                  Then open http://localhost:3000
                  EOF
                  tar -C stage -czf "${{ matrix.archive }}" .

            - name: Stage package (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path stage, stage\src | Out-Null
                  Copy-Item "C:\t\release\${{ matrix.bin }}" stage\
                  Copy-Item examples\rust-axum\src\index.html stage\src\
                  Copy-Item _vendor\node_modules stage\node_modules -Recurse
                  @"
                  Perspective rust-axum example (Conan build)

                  Run from this directory so .\src\index.html and .\node_modules resolve:

                      .\rust-axum.exe

                  Then open http://localhost:3000
                  "@ | Set-Content stage\RUN.txt
                  Compress-Archive -Path stage\* -DestinationPath "${{ matrix.archive }}" -Force

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.archive }}
                  path: ${{ matrix.archive }}
                  if-no-files-found: error

    # ── On a v* tag: gather the per-OS archives and cut a GitHub Release ───────
    release:
        name: Release
        needs: [build]
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        steps:
            - name: Download all build artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true

            - name: Publish GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: dist/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
