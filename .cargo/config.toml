[build]
rustflags = ["--cfg=web_sys_unstable_apis", "-Csymbol-mangling-version=v0"]
# rustflags = [
#     "--cfg=web_sys_unstable_apis",
#     "--cfg=pyo3_disable_reference_pool",
#     "-Csymbol-mangling-version=legacy",
#     "-Zunstable-options",
# ]
target-dir = "rust/target"

# crt-static removed for the Conan build: the C++ engine + Conan deps link the
# DYNAMIC CRT (/MD) (conan profile compiler.runtime=dynamic + build.rs
# static_crt(false)); Rust must match or the final link fails with LNK2038.
[target.i686-pc-windows-msvc]
rustflags = ["--cfg=web_sys_unstable_apis"]

[target.x86_64-pc-windows-msvc]
rustflags = ["--cfg=web_sys_unstable_apis"]

[future-incompat-report]
frequency = 'never'

# Required to build from a subdir / on GH Actions, which doesn't always use the
# root `Cargo.toml`. Server-only set (viewer/js/python crates removed).
[patch.crates-io]
perspective-client = { path = "rust/perspective-client" }
perspective-server = { path = "rust/perspective-server" }
perspective = { path = "rust/perspective" }

[unstable]
bindeps = true

[term]
quiet = false
verbose = false
color = 'always'
